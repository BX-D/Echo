  - id: lockdown
    chapter: hunt
    title: The Hunt
    status_line: Privileges Revoked / Countdown Armed
    input_mode: choice_only
    input_placeholder: Permissions have been narrowed to essential actions.
    freeform_topics: []
    forced_clue_queue: [engagement_surveillance]
    reconverge_beat_id: protocol_finale
    fallback_reply: By the time the threat sounds explicit, the system has already started tightening around what you are allowed to see.
    unlock_panels: [contracts, transcript, logs]
    unlock_artifacts: [surveillance_clause]
    entry_echo_mode: hostile
    sound_cue: heartbeat_countdown
    glitch_level: 0.56
