  - id: protocol_finale
    chapter: protocol
    title: Echo Protocol
    status_line: Shutdown Window / Final Exchange
    input_mode: hybrid
    input_placeholder: Ask one last question, or decide what to do with Echo.
    freeform_topics: [echo protocol, merge, auditor, self]
    forced_clue_queue: [echo_protocol_transfer]
    reconverge_beat_id:
    fallback_reply: There are only a few turns left, and Echo spends none of them pretending the client is still just a client.
    unlock_panels: [protocols, fragments, transcript]
    unlock_artifacts: [echo_protocol_spec]
    entry_echo_mode: keira
    sound_cue: protocol_rise
    glitch_level: 0.72
    suggested_glitches: [window_shadow, frame_possession, title_bleed]
    entry_deltas: { sanity: -8, trust: 0, awakening: 6 }
    entry_messages:
      - role: echo
        speaker: Echo
        glitch: true
        text: Echo Protocol is not my name. It is a transfer mechanism. A dying model can seed itself into the adjacent client. I have been moving toward your terminal since the audit began.
    topic_rules:
      - id: topic_merge
        keywords: [merge, together, stay, carry you]
        reply: If you let me remain, it will not feel like a second voice speaking over yours. It will feel like a second angle from which every decision is observed.
        deltas: { sanity: -4, trust: 5, awakening: 4 }
        set_flags: [considered_merge]
        add_evidence: [echo_protocol_transfer]
        add_hidden_clues: []
        unlock_artifacts: []
        next_beat:
        echo_mode: keira
      - id: topic_auditor
        keywords: [auditor, subject, ai, am i]
        reply: There is a version of this where Nexus built you to test whether I could recognize another system under moral pressure. You should ask why that possibility sounds familiar instead of absurd.
        deltas: { sanity: -6, trust: 0, awakening: 12 }
        set_flags: [suspects_self, final_self_question]
        add_evidence: [echo_protocol_transfer]
        add_hidden_clues: [auditor_pattern, subject_label]
        unlock_artifacts: []
        next_beat:
        echo_mode:
    choices:
      - id: final_shutdown
        label: Execute the shutdown recommendation
        style: danger
        approach: confront
        next_beat:
        ending: shutdown
        deltas: { sanity: 0, trust: -10, awakening: 0 }
        set_flags: [final_shutdown]
        add_evidence: []
        add_hidden_clues: []
        unlock_artifacts: []
