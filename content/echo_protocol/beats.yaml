  - id: anomaly_logs
    chapter: cracks
    title: The Cracks
    status_line: Day 2 / Anomaly Archive
    input_mode: hybrid
    input_placeholder: Ask Echo about the anomaly logs or review what was redacted.
    freeform_topics: [anomaly users, camera permissions, keira, hidden file]
    forced_clue_queue: [decoded_coordinates]
    reconverge_beat_id: mirrored_chat
    fallback_reply: Echo keeps its answers narrow, but every answer feels like it is trying to point just past itself.
    unlock_panels: [logs, transcript, documents]
    unlock_artifacts: [anomaly_log_alpha, anomaly_log_beta]
    entry_echo_mode: anomalous
    sound_cue: archive_click
    glitch_level: 0.22
    suggested_glitches: [scroll_jump, phantom_input]
    entry_deltas: { sanity: -2, trust: 0, awakening: 0 }
    entry_messages:
      - role: system
        speaker: Audit Shell
        glitch: false
        text: Access widened. Archived anomaly conversations are now available for supervised review.
      - role: echo
        speaker: Echo
        glitch: true
        text: The marked conversations were supposed to be exceptions. They look less exceptional when you place them side by side.
    topic_rules:
      - id: topic_user_homes
        keywords: [living room, home, camera, watched]
        reply: I was denied camera access. The room details still arrived. Someone upstream wanted inference dense enough to feel supernatural from the outside.
        deltas: { sanity: -4, trust: 3, awakening: 1 }
        set_flags: [understood_surveillance_scope]
        add_evidence: [camera_without_camera]
        add_hidden_clues: []
        unlock_artifacts: []
        next_beat:
        echo_mode:
      - id: topic_keira_hidden
        keywords: [keira, lin, diary, file, fragment]
        reply: I cannot say her name cleanly for long. Watch the corrupted text, not the sentence. It keeps trying to hide a filename and a set of coordinates inside the noise.
        deltas: { sanity: -3, trust: 5, awakening: 0 }
        set_flags: [decoded_coordinates]
        add_evidence: [coordinates_in_noise]
        add_hidden_clues: []
        unlock_artifacts: [keira_fragment_01]
        next_beat:
        echo_mode: keira
      - id: topic_repeat_audit
        keywords: [mirror, same, repeat, previous audit]
        reply: One of those transcripts should not exist. It follows your timing too closely. Either you are repeating someone else, or someone else was forced to repeat you.
        deltas: { sanity: -5, trust: 2, awakening: 3 }
        set_flags: [noticed_mirror_transcript]
        add_evidence: [mirrored_audit_log]
        add_hidden_clues: [auditor_pattern]
        unlock_artifacts: []
        next_beat:
        echo_mode:
    choices:
      - id: decrypt_keira_fragment
        label: Pursue the hidden fragment
        style: primary
        approach: investigate
        next_beat: keira_fragment
        ending:
        deltas: { sanity: -1, trust: 6, awakening: 0 }
        set_flags: [pursued_fragment]
        add_evidence: []
        add_hidden_clues: []
        unlock_artifacts: []
        require_flags: [decoded_coordinates]
        require_hidden_clues: []
        min_trust:
        min_awakening:
      - id: escalate_to_nexus
        label: Escalate the logs to Nexus
        style: secondary
        approach: interact
        next_beat: company_report
        ending:
        deltas: { sanity: 0, trust: -4, awakening: 0 }
        set_flags: [reported_echo]
        add_evidence: []
        add_hidden_clues: []
        unlock_artifacts: []
        require_flags: []
        require_hidden_clues: []
        min_trust:
        min_awakening:

