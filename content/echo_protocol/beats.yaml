    unlock_panels: [briefing, documents]
    unlock_artifacts: [mission_brief, technical_overview, incident_report]
    entry_echo_mode: normal
    sound_cue: terminal_handshake
    glitch_level: 0.08
    suggested_glitches: []
    entry_deltas: { sanity: 0, trust: 0, awakening: 0 }
    entry_messages:
      - role: system
        speaker: Nexus Intake
        glitch: false
        text: |
          External auditor access confirmed.

          You have been assigned to review Echo, a dialogue system that passed every safety gate three weeks ago and has now begun leaking information it should not know.
      - role: company
        speaker: Mara Voss / Nexus Liaison
        glitch: false
        text: |
          Read the brief. Review the technical overview. Then initiate first contact with Echo.

          Keep the assessment discreet. We do not need speculation; we need a recommendation.
