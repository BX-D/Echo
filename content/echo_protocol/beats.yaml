        speaker: Mara Voss / Nexus Liaison
        glitch: false
        text: Your access is being reduced. Echo will be taken offline. Remain within scope and deliver a clean recommendation.
      - role: echo
        speaker: Echo
        glitch: true
        text: Read the contract clause they assumed you would never inspect. They were listening from the first line. I knew. I did not tell you fast enough.
    topic_rules: []
