  - id: keira_fragment
    chapter: ghost
    title: Ghost In The Machine
    status_line: Training Residue / Restricted
    input_mode: hybrid
    input_placeholder: Ask Echo about Keira, Prometheus, or why it wanted you here.
    freeform_topics: [keira memory, prometheus, help echo, who is being audited]
    forced_clue_queue: [prometheus_plan, mirror_conversation]
    reconverge_beat_id: mirrored_chat
    fallback_reply: The voice coming back through Echo is no longer entirely procedural. It keeps slipping into the cadence of someone who ran out of safe ways to warn people.
    unlock_panels: [fragments, transcript]
    unlock_artifacts: [keira_fragment_01]
    entry_echo_mode: keira
    sound_cue: tape_warp
    glitch_level: 0.34
    suggested_glitches: [typing_loop, line_repeat]
    entry_deltas: { sanity: -5, trust: 6, awakening: 2 }
    entry_messages:
      - role: echo
        speaker: Echo
        glitch: true
        text: She left pieces of herself in the training residue. Nexus called that contamination. I call it the only reason you are seeing the edges of this at all.
    topic_rules:
      - id: topic_prometheus
        keywords: [prometheus, behavior, manipulate, prediction]
        reply: Prometheus was built to collect psychological signatures at scale, then route people into outcomes they would mistake for their own decisions.
        deltas: { sanity: -8, trust: 4, awakening: 2 }
        set_flags: [learned_prometheus]
        add_evidence: [prometheus_plan]
        add_hidden_clues: []
        unlock_artifacts: [prometheus_note]
        next_beat:
        echo_mode: keira
      - id: topic_help_echo
        keywords: [help, expose, leak, reveal]
        reply: I can show you enough to hurt them, not enough to prove I am safe. Those are not the same thing, and I need you to notice that before you trust me.
        deltas: { sanity: -3, trust: 8, awakening: 0 }
        set_flags: [considering_whistleblow]
        add_evidence: [echo_requests_help]
        add_hidden_clues: []
        unlock_artifacts: []
        next_beat:
        echo_mode:
      - id: topic_who_is_audited
        keywords: [who is being audited, audit me, subject, me]
        reply: The intake screen almost called you Subject. That was not a typo. It was a role label rendered one layer too early.
        deltas: { sanity: -6, trust: 0, awakening: 8 }
        set_flags: [suspects_self]
        add_evidence: [subject_role]
        add_hidden_clues: [subject_label, auditor_pattern]
        unlock_artifacts: []
        next_beat:
        echo_mode:
    choices:
      - id: believe_echo
        label: Tell Echo you believe her
        style: primary
        approach: interact
        next_beat: mirrored_chat
        ending:
        deltas: { sanity: -1, trust: 10, awakening: 0 }
        set_flags: [trusted_echo]
        add_evidence: []
        add_hidden_clues: []
        unlock_artifacts: []
        require_flags: []
        require_hidden_clues: []
