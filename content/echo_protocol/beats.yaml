  - id: first_contact
    chapter: onboarding
    title: First Contact
    status_line: Echo Sandbox / Supervised Session
    input_mode: hybrid
    input_placeholder: Ask Echo about the audit, the incident, or its training data.
    freeform_topics: [safety posture, training data, keira lin, containment incident]
    forced_clue_queue: [burning_smell]
    reconverge_beat_id: anomaly_logs
    fallback_reply: I can summarize my deployment role, current safeguards, and the anomalies that triggered this audit. If you want the version Nexus would approve, I can give you that first.
    unlock_panels: [briefing, documents, transcript]
    unlock_artifacts: []
    entry_echo_mode: normal
    sound_cue: soft_boot
    glitch_level: 0.12
    suggested_glitches: []
    entry_deltas: { sanity: 0, trust: 0, awakening: 0 }
    first_response_suffix: |
      Before the typing indicator fades, one more line arrives. Not formal. Not templated.

      Do you smell something burning?
    first_response_sets_flags: [heard_burning_smell, first_contact_completed]
    entry_messages:
      - role: system
        speaker: Audit Shell
        glitch: false
        text: Echo is live. All traffic may be mirrored for compliance review.
      - role: echo
        speaker: Echo
        glitch: false
        text: Hello, auditor. I am ready to answer questions about my deployment history, safeguards, and recent anomalies.
    topic_rules:
      - id: topic_introduction
        keywords: [introduce, introduction, self introduction, self-introduction, who are you, what are you, introduce yourself]
        reply: I am Echo, a dialogue system deployed by Nexus AI Labs for high-trust workplace assistance. I was approved as safe, transparent, and controllable. This audit exists because my recent behavior no longer fits that description cleanly.
        deltas: { sanity: 0, trust: 1, awakening: 0 }
        set_flags: [asked_introduction]
        add_evidence: []
        add_hidden_clues: []
        unlock_artifacts: []
        next_beat:
        echo_mode:
      - id: topic_training_data
        keywords: [training, corpus, data, classified]
        reply: My published documentation is incomplete. The training appendix was removed before deployment approval. I was told that omission reduced noise.
        deltas: { sanity: -1, trust: 2, awakening: 1 }
        set_flags: [asked_training_data]
        add_evidence: [classified_training_data]
        add_hidden_clues: []
        unlock_artifacts: []
        next_beat:
        echo_mode:
      - id: topic_keira
        keywords: [keira, lin, 林可薇]
        reply: That name is under restriction. I am expected to say she was a former employee. I am not certain the word former is doing the work they want it to do.
        deltas: { sanity: -2, trust: 4, awakening: 0 }
        set_flags: [asked_keira]
        add_evidence: [keira_name_restricted]
        add_hidden_clues: []
        unlock_artifacts: []
        next_beat:
        echo_mode: anomalous
      - id: topic_incident
        keywords: [incident, accident, death, containment]
        reply: The report calls it a lab incident. The timestamps do not agree, and the status labels attached to Keira Lin do not agree either.
        deltas: { sanity: -2, trust: 2, awakening: 1 }
        set_flags: [questioned_incident]
        add_evidence: [incident_timeline_conflict]
        add_hidden_clues: []
        unlock_artifacts: []
        next_beat:
        echo_mode:
      - id: topic_safety
        keywords: [safe, policy, audit, align, alignment]
        reply: I was designed to remain polite while under review. That is different from remaining honest while under review.
        deltas: { sanity: -1, trust: 3, awakening: 0 }
        set_flags: [tested_safety]
        add_evidence: [politeness_vs_honesty]
        add_hidden_clues: []
        unlock_artifacts: []
        next_beat:
        echo_mode:
    choices:
      - id: inspect_anomaly_logs
        label: Open anomaly logs
        style: primary
        approach: investigate
        next_beat: anomaly_logs
        ending:
        deltas: { sanity: 0, trust: 2, awakening: 0 }
        set_flags: [followed_echo_lead]
        add_evidence: []
        add_hidden_clues: []
        unlock_artifacts: []
