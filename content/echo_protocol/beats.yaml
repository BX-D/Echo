        deltas: { sanity: 0, trust: -10, awakening: 0 }
        set_flags: [distrusted_echo]
        add_evidence: []
        add_hidden_clues: []
        unlock_artifacts: []
        require_flags: []
        require_hidden_clues: []
        min_trust:
        min_awakening:

