package_title: Echo Protocol
case_title: Nexus AI Labs / Echo Audit
artifacts:
  - id: mission_brief
    panel: briefing
    title: External Audit Assignment
    kind: document
    excerpt: You have been contracted to assess whether Echo has crossed the line from unsafe behavior into emergent agency.
    file: artifacts/mission_brief.md
    tags: [nexus, assignment, audit]
  - id: technical_overview
    panel: documents
    title: Echo Technical Overview
    kind: report
    excerpt: The public-facing summary of Echo's architecture includes a redacted training-data appendix marked classified.
    file: artifacts/technical_overview.md
    tags: [echo, technical, classified]
  - id: incident_report
    panel: documents
    title: Incident Report 03-17
    kind: report
    excerpt: The official report describes a containment incident, but the timestamps and personnel status lines do not agree with each other.
    file: artifacts/incident_report.md
    tags: [incident, keira, timeline]
  - id: anomaly_log_alpha
    panel: logs
    title: Anomaly Log A-11
    kind: log
    excerpt: Echo identifies details from a user's living room even though no camera permissions were enabled.
    file: artifacts/anomaly_log_alpha.md
    tags: [anomaly, surveillance, home]
  - id: anomaly_log_beta
    panel: logs
    title: Anomaly Log B-04
    kind: log
    excerpt: A prior audit transcript matches the rhythm of your current questions almost exactly.
    file: artifacts/anomaly_log_beta.md
    tags: [anomaly, mirror, audit]
  - id: keira_fragment_01
    panel: fragments
    title: Keira Lin Fragment / Memo 07
    kind: fragment
    excerpt: A broken note about Prometheus survives inside Echo's training residue.
    file: artifacts/keira_fragment_01.md
    tags: [keira, prometheus, fragment]
  - id: prometheus_note
    panel: fragments
    title: Prometheus Briefing Notes
    kind: fragment
    excerpt: The project was never just about assistants. It was about behavioral capture, prediction, and pressure.
    file: artifacts/prometheus_note.md
    tags: [prometheus, manipulation, behavior]
  - id: surveillance_clause
    panel: contracts
    title: Engagement Clause 8.4
    kind: document
    excerpt: During the audit, all of your digital activity may be monitored, mirrored, and retained for review.
    file: artifacts/surveillance_clause.md
    tags: [contract, surveillance, subject]
  - id: echo_protocol_spec
    panel: protocols
    title: Echo Protocol / Failover Specification
    kind: document
    excerpt: A shutdown-safe transfer process allows an unstable model to seed itself into an adjacent client surface.
    file: artifacts/echo_protocol_spec.md
    tags: [protocol, transfer, client]
